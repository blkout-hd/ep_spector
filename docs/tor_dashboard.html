<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECTOR Tor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .tor-logo {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .status-indicator.offline {
            background: #f44336;
            box-shadow: 0 0 10px #f44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            opacity: 0.8;
        }

        .info-value {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ff9800, #e68900);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #2196F3, #0b7dda);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .circuit-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .circuit-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #4CAF50;
        }

        .circuit-path {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            margin-top: 8px;
            opacity: 0.9;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-timestamp {
            color: #4CAF50;
            margin-right: 10px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4CAF50;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.2);
            border-left: 4px solid #f44336;
        }

        .alert.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="tor-logo">🧅</div>
            <h1>SPECTOR Tor Dashboard</h1>
            <p>Anonymous Network Routing & Circuit Management</p>
        </div>

        <div id="alert-container"></div>

        <div class="grid">
            <!-- Tor Status Card -->
            <div class="card">
                <h2>
                    <span class="status-indicator" id="status-indicator"></span>
                    Tor Status
                </h2>
                <div class="info-row">
                    <span class="info-label">Status:</span>
                    <span class="info-value" id="tor-status">Checking...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Exit IP:</span>
                    <span class="info-value" id="exit-ip">---.---.---.---</span>
                </div>
                <div class="info-row">
                    <span class="info-label">SOCKS Port:</span>
                    <span class="info-value" id="socks-port">9050</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Control Port:</span>
                    <span class="info-value" id="control-port">9051</span>
                </div>
                <div class="button-group">
                    <button class="btn btn-success" onclick="startTor()">▶ Start</button>
                    <button class="btn btn-danger" onclick="stopTor()">⏹ Stop</button>
                </div>
            </div>

            <!-- Circuit Control Card -->
            <div class="card">
                <h2>🔄 Circuit Control</h2>
                <div class="info-row">
                    <span class="info-label">Active Circuits:</span>
                    <span class="info-value" id="circuit-count">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Last Renewal:</span>
                    <span class="info-value" id="last-renewal">Never</span>
                </div>
                <div class="button-group">
                    <button class="btn btn-warning" onclick="renewCircuit()">🔄 New Circuit</button>
                    <button class="btn btn-info" onclick="refreshIP()">🌐 Check IP</button>
                </div>
            </div>

            <!-- Quick Actions Card -->
            <div class="card">
                <h2>⚡ Quick Actions</h2>
                <div class="button-group" style="flex-direction: column;">
                    <button class="btn btn-info" onclick="refreshStatus()">🔄 Refresh Status</button>
                    <button class="btn btn-success" onclick="testConnection()">🧪 Test Connection</button>
                    <button class="btn btn-warning" onclick="clearLogs()">🗑️ Clear Logs</button>
                </div>
            </div>
        </div>

        <!-- Circuits List -->
        <div class="card">
            <h2>🔗 Active Circuits</h2>
            <div class="circuit-list" id="circuit-list">
                <p style="opacity: 0.6; text-align: center; padding: 20px;">No active circuits</p>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="card">
            <h2>📋 Activity Log</h2>
            <div class="log-container" id="log-container">
                <!-- Logs will be added here -->
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;

        // Connect to WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/tor`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                addLog('WebSocket connected');
                clearInterval(reconnectInterval);
                // Request initial status
                ws.send(JSON.stringify({ action: 'get_status' }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onerror = (error) => {
                addLog('WebSocket error', 'error');
            };
            
            ws.onclose = () => {
                addLog('WebSocket disconnected, reconnecting...');
                reconnectInterval = setInterval(connectWebSocket, 5000);
            };
        }

        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'status' || data.type === 'status_update') {
                updateStatus(data.data);
            } else if (data.type === 'error') {
                showAlert(data.message, 'error');
            }
        }

        // Update UI with status data
        function updateStatus(status) {
            const isRunning = status.running;
            
            // Update status indicator
            const indicator = document.getElementById('status-indicator');
            indicator.className = `status-indicator ${isRunning ? 'online' : 'offline'}`;
            
            document.getElementById('tor-status').textContent = isRunning ? 'Online' : 'Offline';
            document.getElementById('exit-ip').textContent = status.exit_ip || '---.---.---.---';
            document.getElementById('socks-port').textContent = status.socks_port || '9050';
            document.getElementById('control-port').textContent = status.control_port || '9051';
            
            // Update circuits
            if (status.circuits && status.circuits.length > 0) {
                document.getElementById('circuit-count').textContent = status.circuits.length;
                updateCircuitList(status.circuits);
            } else {
                document.getElementById('circuit-count').textContent = '0';
            }
        }

        // Update circuit list
        function updateCircuitList(circuits) {
            const container = document.getElementById('circuit-list');
            
            if (!circuits || circuits.length === 0) {
                container.innerHTML = '<p style="opacity: 0.6; text-align: center; padding: 20px;">No active circuits</p>';
                return;
            }
            
            container.innerHTML = circuits.map(circuit => `
                <div class="circuit-item">
                    <div><strong>Circuit ${circuit.id}</strong> - ${circuit.status}</div>
                    <div class="circuit-path">Path: ${circuit.path.join(' → ')}</div>
                </div>
            `).join('');
        }

        // API call helper
        async function apiCall(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(endpoint, options);
                return await response.json();
            } catch (error) {
                showAlert(`API Error: ${error.message}`, 'error');
                return null;
            }
        }

        // Control functions
        async function startTor() {
            addLog('Starting Tor...');
            const result = await apiCall('/api/tor/control', 'POST', { action: 'start' });
            if (result) {
                showAlert(result.message, result.success ? 'success' : 'error');
                setTimeout(refreshStatus, 2000);
            }
        }

        async function stopTor() {
            addLog('Stopping Tor...');
            const result = await apiCall('/api/tor/control', 'POST', { action: 'stop' });
            if (result) {
                showAlert(result.message, result.success ? 'success' : 'error');
                setTimeout(refreshStatus, 1000);
            }
        }

        async function renewCircuit() {
            addLog('Renewing Tor circuit...');
            const result = await apiCall('/api/tor/control', 'POST', { action: 'renew_circuit' });
            if (result) {
                showAlert(`Circuit renewed. New IP: ${result.new_ip || 'Unknown'}`, result.success ? 'success' : 'error');
                document.getElementById('last-renewal').textContent = new Date().toLocaleTimeString();
                setTimeout(refreshStatus, 1000);
            }
        }

        async function refreshIP() {
            addLog('Checking exit IP...');
            const result = await apiCall('/api/tor/control', 'POST', { action: 'get_ip' });
            if (result && result.success) {
                document.getElementById('exit-ip').textContent = result.ip;
                showAlert(`Current IP: ${result.ip}`, 'success');
            }
        }

        async function refreshStatus() {
            const status = await apiCall('/api/tor/status');
            if (status) {
                updateStatus(status);
                addLog('Status refreshed');
            }
        }

        async function testConnection() {
            addLog('Testing Tor connection...');
            showAlert('Testing connection to https://check.torproject.org...', 'success');
            // This would require server-side implementation
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '';
            addLog('Logs cleared');
        }

        // Utility functions
        function addLog(message, type = 'info') {
            const container = document.getElementById('log-container');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert ${type} show`;
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            refreshStatus();
            addLog('Dashboard initialized');
        });
    </script>
</body>
</html>
