<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#grad1)" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Magnifying Glass Handle -->
  <rect x="240" y="240" width="12" height="80" fill="#ffffff" rx="6" transform="rotate(45 246 280)"/>
  
  <!-- Magnifying Glass Circle -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#ffffff" stroke-width="12"/>
  
  <!-- Inner Network Pattern -->
  <!-- Central Node -->
  <circle cx="200" cy="200" r="10" fill="#00d4ff"/>
  
  <!-- Connection Nodes -->
  <circle cx="160" cy="170" r="8" fill="#ffffff"/>
  <circle cx="240" cy="170" r="8" fill="#ffffff"/>
  <circle cx="220" cy="230" r="8" fill="#ffffff"/>
  <circle cx="180" cy="230" r="8" fill="#ffffff"/>
  
  <!-- Connection Lines -->
  <line x1="200" y1="200" x2="160" y2="170" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  <line x1="200" y1="200" x2="240" y2="170" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  <line x1="200" y1="200" x2="220" y2="230" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  <line x1="200" y1="200" x2="180" y2="230" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  
  <!-- Text: SPECTOR -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">SPECTOR</text>
  
  <!-- Subtitle -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">Semantic Pipeline for Entity Correlation</text>
</svg>
