# .github/dependabot.yml
# Automated dependency updates for SPECTOR project

version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor:
        update-types:
          - minor
          - patch

  # Docker dependencies
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps/docker)"

  # GitHub Actions dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps/ci)"

  # Julia dependencies
  - package-ecosystem: julia
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - julia
    commit-message:
      prefix: "chore(deps/julia)"
